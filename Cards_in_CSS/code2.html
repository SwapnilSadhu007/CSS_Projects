<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Card</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100vw;
            height: 100vh;
            background-image: linear-gradient(120deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            
            justify-content: center;
            align-items: center;
            
        }
        
            
        
        .card{
            width: 400px;
            height: 600px;
            background-color: beige;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;

        }
        .card img{
            width: 100%;
            height: 30%;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }
        .textBox{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 75%;
            text-align: center;

        }
        #amountBox{
            width: 80%;
            height: 10%;
            background-image: linear-gradient(120deg, #f6d365 0%, #fda085 100%);
            
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-right: 20px ;
            padding-left: 20px;

        }
        #leftBox{
            height: 100%;
            width: fit-content;
            display: flex;
            gap: 15px;
            align-items: center;


        }
        .imgBox{
            height: 120px;
            width: 40px;
            display: flex;
            justify-content: center;
            align-items: center;

        }
        
        #paymentButton{
            width: 80%;
            height: 9%;
            background-image: linear-gradient(120deg, #f6d365 0%, #fda085 100%);
            color: black;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.19), 0 6px 6px rgba(0, 0, 0, 0.23);
        }
        .cancelBox a{
            text-decoration: none;
            color: rgb(47, 46, 46);
            font-weight: bold;
            font-size: large;
        }
        #selector1{
            width: 50px;
            background-image: linear-gradient(120deg, #f6d365 0%, #fda085 100%);

        }
    </style>

    
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="Convert the uploaded.png" >
            <div class="textBox">
                <h2>
                    Description
                </h2>
                <p>Arijit Singh’s songs blend emotion and melody across genres—romantic, soulful, and upbeat. His expressive voice and versatile style make him a beloved icon in contemporary Indian music..</p>
            </div>
            <div id="amountBox">
                <div id="leftBox">
                    <div class="imgBox">
                        <img src="music-logo-design.jpg" >
                    </div>
                    <div id="textAmountBox">
                        <p>Amount</p>
                        <p>$99.9/year</p>
                    </div>

                </div>
                <div class="rightBox">
                    <!-- <a href="#">Change</a> -->
                     <label for="selector1">Change:</label>
                     <select name="Subscription" id="selector1">
                        
                        <option value="$5/day">Daily:$5/day</option>
                        <option value="$15/week">Weekly:$15/week</option>
                        <option value="$30/month">Monthly:$30/month</option>
                        <option value="$99.9/year">Yearly:$99.9/year</option>
                     </select>
                </div>

            </div>
            <button id="paymentButton">
                Proceed to Pay

            </button>
            <div class="cancelBox">
                <a href="#">Cancel Order</a>
            </div>
            
            

        </div>
    </div>
    
</body>
</html>
