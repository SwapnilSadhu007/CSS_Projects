<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100vw;
            height: 100vh;
            background-image: linear-gradient(120deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            
            justify-content: center;
            align-items: center;
        }
        .card{
            width: 360px;
            height: 600px;
            background-color: beige;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            padding: 20px;

        }
        .card img{
            height: 57%;
            border-radius: 10px;

        }
        .card h2{
            font-weight: bold;
            font-size: 1.7rem;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;

             
            
            
        }
        .card p{
            font-weight: bold;
            font-size: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center

        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="swapnilqr.jpeg">
            <h2>LinkedIn Profile of  SWAPNIL SADHU</h2>
            <p>Scan the QR Code to visit the profile of SWAPNIL SADHU</p>

        </div>

    </div>
    
</body>
</html>
